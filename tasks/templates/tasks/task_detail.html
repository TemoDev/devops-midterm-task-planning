<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ task.title }} — Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; color: #222; background: #fff; }
    header {
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      padding: 0.75rem 2rem;
      font-weight: bold;
      font-size: 1.1rem;
    }
    main { max-width: 720px; margin: 0 auto; padding: 2rem; }
    a { color: #222; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .back-link { font-size: 0.9rem; color: #555; margin-bottom: 1.5rem; display: inline-block; }
    .task-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 1.5rem;
    }
    .task-id { font-size: 0.8rem; color: #999; margin-bottom: 0.4rem; }
    .task-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .task-title.completed {
      text-decoration: line-through;
      color: #888;
    }
    .task-description {
      font-size: 0.95rem;
      color: #444;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .task-meta { font-size: 0.85rem; color: #888; }
    .task-meta span { display: block; margin-bottom: 0.2rem; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .badge.pending { background: #fff3cd; color: #7a5800; border: 1px solid #f0d060; }
    .badge.done { background: #d4edda; color: #155724; border: 1px solid #b8dfc4; }
  </style>
</head>
<body>
  <header>Task Manager</header>
  <main>
    <a class="back-link" href="/">&larr; Back to all tasks</a>
    <div class="task-card">
      <div class="task-id">Task #{{ task.id }}</div>
      <div class="task-title {% if task.completed %}completed{% endif %}">{{ task.title }}</div>
      {% if task.description %}
        <div class="task-description">{{ task.description }}</div>
      {% else %}
        <div class="task-description" style="color:#bbb;font-style:italic;">No description provided.</div>
      {% endif %}
      <div class="task-meta">
        <span>Created: {{ task.created_at }}</span>
      </div>
      {% if task.completed %}
        <span class="badge done">Completed</span>
      {% else %}
        <span class="badge pending">Pending</span>
      {% endif %}
    </div>
  </main>
</body>
</html>
